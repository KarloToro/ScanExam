<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScanExam - Dashboard{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bs-body-bg: #0f1115;
            --bs-body-color: #e2e8f0;
            --bs-primary: #8b5cf6;
            --bs-primary-rgb: 139, 92, 246;
            --bs-surface: #1e2128;
            --bs-border-color: #334155;
        }
        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card-custom {
            background-color: var(--bs-surface);
            border: 1px solid var(--bs-border-color);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .table-custom th {
            background-color: #16191f;
            border-bottom: 2px solid var(--bs-primary);
            color: #94a3b8;
        }
        .table-custom td {
            background-color: var(--bs-surface);
            border-bottom: 1px solid var(--bs-border-color);
            padding: 8px;
            vertical-align: middle;
        }
        .table-custom input {
            background-color: #0f1115;
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 6px 12px;
            width: 100%;
        }
        .btn-primary {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #7c3aed;
            border-color: #7c3aed;
        }
        .form-control {
            background-color: #0f1115;
            color: #e2e8f0;
            border: 1px solid var(--bs-border-color);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark mb-5" style="background-color: var(--bs-surface); border-bottom: 1px solid var(--bs-border-color);">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="#" style="color: var(--bs-primary);">
                ScanExam Monolito
            </a>
        </div>
    </nav>

    <main class="container mb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
