# ScanExam AI — orquestación local (Ubuntu VM / Docker).
#
# Servicios:
#   - mlflow       : tracking + Model Registry (clasificador de burbujas).
#   - trainer      : job de un solo uso que entrena y registra el modelo champion.
#   - scanexam-app : API HTTP del pipeline (P3).
#   - n8n          : orquestador del pipeline (P3).
#   - mongo        : base de datos del panel (usuarios / auth).
#   - panel-api    : API Go del panel docente (P4).
#   - panel-web    : frontend Nuxt del panel docente (P4).

name: scanexam

services:
  # --------------------------------------------------------------------------
  # MLflow: tracking de experimentos + Model Registry.
  # Corre desde nuestra propia imagen de app (ya trae mlflow instalado),
  # así no dependemos de descargar una imagen externa.
  # --------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: scanexam-app:latest
    container_name: scanexam-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "mlflow:5000,localhost:5000,127.0.0.1:5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # Trainer: entrena el clasificador de burbujas (P1) y lo registra como
  # `bubble_classifier@champion`. Exporta el .pt a ./models del host vía el
  # volumen del repo. Es un job de un solo uso (no queda levantado).
  # --------------------------------------------------------------------------
  trainer:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: scanexam-app:latest
    container_name: scanexam-trainer
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # core_classifier.py (P1) hace `import config`, que solo resuelve con app/
      # en el path. Se añade aquí (no invasivo) en vez de tocar el archivo de P1.
      PYTHONPATH: /workspace:/workspace/app
    volumes:
      - ./:/workspace
    command: ["python", "-m", "app.train_classifier", "--epochs", "30"]

  # --------------------------------------------------------------------------
  # scanexam-app: API HTTP del pipeline (P3). Servicio de larga vida que expone
  # las fases (build-batch, run-vision, crops-classify, score) para que n8n y el
  # panel P4 las invoquen por HTTP. Comparte la red con n8n (host: scanexam-app).
  # --------------------------------------------------------------------------
  scanexam-app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: scanexam-app:latest
    container_name: scanexam-app
    environment:
      PYTHONPATH: /workspace:/workspace/app
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    command: ["python", "-m", "app.api"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------------------------
  # n8n: orquestador del pipeline (P3). Invoca la API de scanexam-app por HTTP
  # (nodos HTTP Request) y enruta por estado de ficha (OK/OBSERVED/ERROR).
  # --------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: scanexam-n8n
    ports:
      - "5678:5678"
    environment:
      # Permite iniciar sesión por http://localhost (sin TLS) en entorno local.
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      GENERIC_TIMEZONE: "America/Lima"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/workspace

  # --------------------------------------------------------------------------
  # mongo: base de datos del panel (usuarios / auth).
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: scanexam-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # panel-api: API Go del panel docente (P4). Autenticación, usuarios y
  # subida de paquetes de examen; dispara el pipeline vía webhook de n8n.
  # Comparte /workspace con n8n y scanexam-app para que vean los uploads.
  # --------------------------------------------------------------------------
  panel-api:
    build:
      context: ./scan-exam-panel/backend
      dockerfile: Dockerfile
    image: scanexam-panel-api:latest
    container_name: scanexam-panel-api
    depends_on:
      mongo:
        condition: service_healthy
      n8n:
        condition: service_started
      scanexam-app:
        condition: service_healthy
    environment:
      PORT: "8080"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRY: "24h"
      ADMIN_PASSWORD: "admin123"
      ADMIN_EMAIL: "admin@localhost"
      SCAN_EXAM_DB_HOST: mongo
      SCAN_EXAM_DB_PORT: "27017"
      SCANEXAM_WORKSPACE: /workspace
      SCANEXAM_UPLOADS_DIR: uploads
      N8N_WEBHOOK_URL: "http://n8n:5678/webhook/scanexam"
    volumes:
      - ./:/workspace
    ports:
      - "8080:8080"

  # --------------------------------------------------------------------------
  # panel-web: frontend Nuxt del panel docente (P4).
  # NUXT_PUBLIC_API_BASE_URL apunta al host (navegador -> localhost:8080).
  # --------------------------------------------------------------------------
  panel-web:
    build:
      context: ./scan-exam-panel/frontend
      dockerfile: Dockerfile
    image: scanexam-panel-web:latest
    container_name: scanexam-panel-web
    depends_on:
      - panel-api
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  mlflow_data:
  n8n_data:
  mongo_data:
